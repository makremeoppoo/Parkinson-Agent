<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0f172a"/>

  <!-- Left brain lobe -->
  <path d="M16 8.5 C16 8.5 13.5 8 11 9.5 C8.5 11 7 13.5 7 16 C7 18.5 8.5 20.5 10.5 21.5 C12.5 22.5 14.5 22 16 21.5 Z"
        fill="#3b82f6"/>

  <!-- Right brain lobe -->
  <path d="M16 8.5 C16 8.5 18.5 8 21 9.5 C23.5 11 25 13.5 25 16 C25 18.5 23.5 20.5 21.5 21.5 C19.5 22.5 17.5 22 16 21.5 Z"
        fill="#60a5fa"/>

  <!-- Gyri lines - left -->
  <path d="M10 13 Q12 12 12.5 14.5" stroke="#1d4ed8" stroke-width="0.9" stroke-linecap="round" fill="none"/>
  <path d="M9.5 17 Q11.5 16 12 18.5" stroke="#1d4ed8" stroke-width="0.9" stroke-linecap="round" fill="none"/>

  <!-- Gyri lines - right -->
  <path d="M22 13 Q20 12 19.5 14.5" stroke="#2563eb" stroke-width="0.9" stroke-linecap="round" fill="none"/>
  <path d="M22.5 17 Q20.5 16 20 18.5" stroke="#2563eb" stroke-width="0.9" stroke-linecap="round" fill="none"/>

  <!-- Interhemispheric fissure -->
  <line x1="16" y1="8.5" x2="16" y2="21.5" stroke="#0f172a" stroke-width="1.4"/>

  <!-- Brain stem -->
  <rect x="14.5" y="21.5" width="3" height="2.5" rx="1" fill="#334155"/>

  <!-- Tremor / EKG wave at bottom -->
  <path d="M4 28.5 L7 28.5 L9 26 L11 31 L13 24 L15 28.5 L17 26.5 L19 28.5 L21 28.5 L28 28.5"
        stroke="#34d399" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
